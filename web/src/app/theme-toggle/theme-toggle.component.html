<button
  type="button"
  class="wac-theme-toggle"
  (click)="themes.toggle()"
  [attr.aria-pressed]="themes.theme() === 'dark'"
  [attr.aria-label]="
    (themes.theme() === 'dark' ? 'theme.ariaToLight' : 'theme.ariaToDark')
      | translate
  "
>
  @if (themes.theme() === "dark") {
    <span class="wac-theme-toggle__icon" aria-hidden="true">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="4" />
        <path
          d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"
        />
      </svg>
    </span>
    <span class="wac-theme-toggle__hint">{{
      "theme.hintLight" | translate
    }}</span>
  } @else {
    <span class="wac-theme-toggle__icon" aria-hidden="true">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
      </svg>
    </span>
    <span class="wac-theme-toggle__hint">{{
      "theme.hintDark" | translate
    }}</span>
  }
</button>
