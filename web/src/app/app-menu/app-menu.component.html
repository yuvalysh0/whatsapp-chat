<div class="wac-app-menu">
  <button
    type="button"
    class="wac-app-menu__trigger"
    (click)="toggle()"
    [attr.aria-expanded]="open()"
    [attr.aria-controls]="menuPanelId"
    aria-haspopup="true"
    [attr.aria-label]="'app.menuAria' | translate"
  >
    <span class="wac-app-menu__trigger-icon" aria-hidden="true">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="22"
        height="22"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
        />
        <circle cx="12" cy="12" r="3" />
      </svg>
    </span>
  </button>

  @if (open()) {
    <div
      class="wac-app-menu__panel"
      [id]="menuPanelId"
      role="region"
      [attr.aria-label]="'app.menuAria' | translate"
    >
      <div class="wac-app-menu__row">
        <span class="wac-app-menu__label" id="wac-app-menu-lang">
          {{ "app.menuLanguage" | translate }}
        </span>
        <wac-locale-toggle class="wac-app-menu__control" />
      </div>
      <div class="wac-app-menu__row">
        <span class="wac-app-menu__label" id="wac-app-menu-theme">
          {{ "app.menuTheme" | translate }}
        </span>
        <wac-theme-toggle class="wac-app-menu__control" />
      </div>
    </div>
  }
</div>
